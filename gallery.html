    <style>
    /* ── Gallery Section ── */
    #gallery {
        padding: 60px 0 120px; background: var(--dark); position: relative;
    }
    #gallery::before {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(228,30,43,.25), transparent);
    }

    .gallery-grid {
        columns: 4; column-gap: 4px;
    }
    .gallery-item {
        break-inside: avoid; margin-bottom: 4px;
        overflow: hidden; position: relative; cursor: pointer;
        display: block;
    }
    .gallery-item img {
        width: 100%; display: block;
        filter: brightness(0.82) saturate(1.1);
        transition: transform .6s ease, filter .6s ease;
    }
    .gallery-item:hover img {
        transform: scale(1.06);
        filter: brightness(0.95) saturate(1.25);
    }
    .gallery-item-overlay {
        position: absolute; inset: 0; pointer-events: none;
        background: rgba(228,30,43,0);
        transition: background .35s;
    }
    .gallery-item:hover .gallery-item-overlay {
        background: rgba(228,30,43,0.1);
    }
    .gallery-item-icon {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%,-50%) scale(0.6);
        opacity: 0; transition: opacity .3s, transform .3s;
        color: rgba(247,238,233,0.85); font-size: 28px; pointer-events: none;
        text-shadow: 0 0 20px rgba(228,30,43,0.8);
    }
    .gallery-item:hover .gallery-item-icon { opacity: 1; transform: translate(-50%,-50%) scale(1); }

    /* ── Lightbox ── */
    .gallery-lb {
        position: fixed; inset: 0; z-index: 9100;
        background: rgba(6,2,1,0.97);
        display: flex; align-items: center; justify-content: center;
        opacity: 0; pointer-events: none;
        transition: opacity .3s;
    }
    .gallery-lb.open { opacity: 1; pointer-events: all; }
    .lb-img {
        max-width: 88vw; max-height: 86vh;
        object-fit: contain; display: block;
        box-shadow: 0 0 80px rgba(228,30,43,0.15);
    }
    .lb-close {
        position: absolute; top: 22px; right: 28px;
        background: none; border: none; color: rgba(247,238,233,.45);
        font-size: 40px; cursor: pointer; line-height: 1;
        transition: color .2s; padding: 4px 8px;
    }
    .lb-close:hover { color: var(--red); }
    .lb-prev, .lb-next {
        position: absolute; top: 50%; transform: translateY(-50%);
        background: rgba(228,30,43,0.12);
        border: 1px solid rgba(228,30,43,0.28);
        color: var(--off-white); font-size: 30px;
        padding: 14px 20px; cursor: pointer;
        transition: background .2s; line-height: 1;
    }
    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }
    .lb-prev:hover, .lb-next:hover { background: rgba(228,30,43,0.32); }
    .lb-counter {
        position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
        font-family: 'Outfit', sans-serif; font-size: 11px; letter-spacing: .28em;
        color: rgba(247,238,233,.3); text-transform: uppercase;
    }

    @media (max-width: 900px) {
        .gallery-grid { columns: 2; }
        .lb-prev { left: 6px; } .lb-next { right: 6px; }
    }
    @media (max-width: 480px) { .gallery-grid { columns: 2; } }
    </style>
</head>

<!-- PAGE HEADER -->

<script src="js/main.js" defer></script>
<script>
(function() {
    var lb = document.getElementById('galleryLb');
    var lbImg = document.getElementById('lbImg');
    var lbCounter = document.getElementById('lbCounter');
    var items = [];
    var current = 0;

    function renderGallery(images) {
        var grid = document.getElementById('galleryGrid');
        grid.innerHTML = images.map(function(img) {
            var src = img.src || '';
            var alt = img.alt || 'Dian Huo Hotpot';
            return '<div class="gallery-item" data-hover>' +
                '<img src="' + src + '" loading="lazy" alt="' + alt + '">' +
                '<div class="gallery-item-overlay"></div>' +
                '<span class="gallery-item-icon">&#8853;</span>' +
                '</div>';
        }).join('');
        initLightbox();
    }

    function initLightbox() {
        items = Array.from(document.querySelectorAll('.gallery-item'));
        items.forEach(function(item, i) {
            item.addEventListener('click', function() { openLb(i); });
        });
        document.getElementById('lbClose').addEventListener('click', closeLb);
        document.getElementById('lbPrev').addEventListener('click', prev);
        document.getElementById('lbNext').addEventListener('click', next);
        lb.addEventListener('click', function(e) { if (e.target === lb) closeLb(); });
        document.addEventListener('keydown', function(e) {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') closeLb();
            if (e.key === 'ArrowLeft') prev();
            if (e.key === 'ArrowRight') next();
        });
    }
    function openLb(i) {
        current = i;
        lbImg.src = items[current].querySelector('img').src;
        lbCounter.textContent = (current + 1) + ' / ' + items.length;
        lb.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLb() {
        lb.classList.remove('open');
        document.body.style.overflow = '';
        setTimeout(function() { lbImg.src = ''; }, 300);
    }
    function prev() {
        current = (current - 1 + items.length) % items.length;
        lbImg.src = items[current].querySelector('img').src;
        lbCounter.textContent = (current + 1) + ' / ' + items.length;
    }
    function next() {
        current = (current + 1) % items.length;
        lbImg.src = items[current].querySelector('img').src;
        lbCounter.textContent = (current + 1) + ' / ' + items.length;
    }

    fetch('/content/gallery.json')
        .then(function(r) { return r.json(); })
        .then(function(data) { renderGallery(data.images || []); })
        .catch(function() {
            document.getElementById('galleryGrid').innerHTML =
                '<p style="color:rgba(247,238,233,.3);padding:40px 0;grid-column:1/-1;">Unable to load gallery. Please refresh.</p>';
        });
})();
</script>
</body>
